services:
  - type: web
    name: trinora-jewellery
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn jewellery.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "trinora-jewellery.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
